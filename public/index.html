<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLS WIFI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#2b1654;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px}
.card{background:#3d2a7d;width:100%;max-width:340px;border-radius:22px;padding:18px;text-align:center;color:white}
.topo{font-size:11px;letter-spacing:1.5px;opacity:.8}
.topo h1{font-size:26px;font-weight:900;margin:2px 0}
.topo p{font-size:11px;opacity:.7;margin-bottom:14px}
.btn-plano{background:white;color:#000;border:2px solid transparent;padding:13px;border-radius:14px;width:100%;font-weight:900;font-size:13px;margin-bottom:9px;cursor:pointer}
.btn-plano.selecionado{border-color:#FFD600;background:#fff8d1}
#btnGerar{display:none;background:#00ff88;color:#000;padding:14px;border-radius:14px;width:100%;font-weight:900;border:none;margin-top:8px;cursor:pointer}
#btnGerar.mostrar{display:block}
#pixArea{display:none}
.btn-gerado{background:#FFD600;color:#000;border:none;padding:12px;border-radius:12px;width:100%;font-weight:900;font-size:13px;margin-bottom:12px}
.pix-box{background:white;border-radius:16px;padding:12px}
#qrcodeImg{width:210px;height:210px;margin:0 auto;display:block;background:white;border-radius:8px}
#pixCopiaECola{word-break:break-all;background:#f2f2f2;color:#222;padding:9px;border-radius:8px;margin-top:10px;font-size:9px;text-align:left;line-height:1.3;border:1px dashed #999}
.btn-copia{background:#FFD600;color:#000;border:none;padding:8px 20px;border-radius:20px;font-weight:900;font-size:12px;cursor:pointer;margin-top:10px}
.btn-copia.copiado{background:#00c851;color:white}
.piscando{color:#333;font-size:12px;font-weight:700;margin-top:10px;animation: pisca 1s infinite}
@keyframes pisca {0%,100%{opacity:1}50%{opacity:.3}}
.link-voucher{color:#b9a6f0;font-size:11px;margin:12px 0;display:block;text-decoration:underline}
.btn-pago{background:#4ade80;color:#000;border:none;padding:13px;border-radius:20px;width:100%;font-weight:900;font-size:13px;cursor:pointer;margin-top:8px}
.mac{font-size:9px;opacity:.5;margin-top:10px}
</style>
</head>
<body>
<div class="card">
<div class="topo">CONECTE - SE AQUI!!!<h1>SLS WIFI 🚀</h1><p>INTERNET RAPIDA AQUI</p></div>
<div id="planosArea">
<button class="btn-plano" onclick="selecionar(2,this)">1 HORA R$ 2,00</button>
<button class="btn-plano" onclick="selecionar(5,this)">2 HORAS R$ 5,00</button>
<button class="btn-plano" onclick="selecionar(12,this)">EVENTO TODO R$ 12,00</button>
<button id="btnGerar" onclick="criarPix()">GERAR PIX</button>
</div>
<div id="pixArea">
<button class="btn-gerado">PIX GERADO!</button>
<div class="pix-box">
<img id="qrcodeImg" src="">
<div id="pixCopiaECola">Gerando...</div>
<button id="btnCopia" class="btn-copia" onclick="copiarPix()">copia e cole</button>
<p class="piscando">Aguardando pagamento...</p>
</div>
<a class="link-voucher">Tenho voucher / Sou da equipe</a>
<button class="btn-pago" id="btnPago" onclick="verificarPagamento()">JA PAGUEI - LIBERAR WIFI</button>
<p class="mac" id="macInfo">MAC: TESTE | IP: -</p>
</div>
</div>
<script>
let valorSelecionado=null;
let ipCliente=null;
let macCliente=null;

window.onload = () => {
 const params = new URLSearchParams(window.location.search);
 ipCliente = params.get('ip') || params.get('client_ip') || null;
 macCliente = params.get('mac') || 'TESTE';
 document.getElementById('macInfo').innerText = `MAC: ${macCliente} | IP: ${ipCliente||'-'}`;
};

function selecionar(v,el){valorSelecionado=v;document.querySelectorAll('.btn-plano').forEach(b=>b.classList.remove('selecionado'));el.classList.add('selecionado');document.getElementById('btnGerar').classList.add('mostrar');}

function copiarPix(){
 const codigo=document.getElementById('pixCopiaECola').innerText;
 if(!codigo||codigo.includes('Gerando')||codigo.includes('Erro')) return;
 navigator.clipboard.writeText(codigo).then(()=>{
  const btn=document.getElementById('btnCopia');
  btn.innerText='✅ copiado!';
  btn.classList.add('copiado');
  setTimeout(()=>{btn.innerText='copia e cole';btn.classList.remove('copiado');},2500);
 });
}

// BOTÃO JA PAGUEI CORRIGIDO - AGORA LIBERA DE VERDADE!
async function verificarPagamento(){
 const btn = document.getElementById('btnPago');
 btn.innerText = 'LIBERANDO...';
 btn.disabled = true;
 try{
  if(!ipCliente){
   // tenta pegar IP do hotspot
   ipCliente = prompt('Qual seu IP? (aparece no hotspot) Ex: 10.5.50.198') || '10.5.50.198';
  }
  const res = await fetch(`/api/liberar?ip=${ipCliente}&mac=${macCliente||'auto'}`);
  const txt = await res.text();
  alert('✅ LIBERADO! '+ipCliente+'\nAguarde 10s e navegue!');
  btn.innerText = '✅ WIFI LIBERADO!';
 }catch(e){
  alert('Erro ao liberar, mas tente navegar! Se não for, chame o staff. Erro:'+e);
  btn.innerText = 'JA PAGUEI - LIBERAR WIFI';
  btn.disabled = false;
 }
}

async function criarPix(){
 if(!valorSelecionado) return alert('Escolha um plano!');
 document.getElementById('planosArea').style.display='none';
 document.getElementById('pixArea').style.display='block';
 document.getElementById('pixCopiaECola').innerText='Gerando PIX REAL...';
 try{
  const res=await fetch('/api/criar-pix',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({valor:valorSelecionado,mac:macCliente})});
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  
  // SEU SERVIDOR MANDA imagemQrcode em base64
  if(data.imagemQrcode){
   document.getElementById('qrcodeImg').src = data.imagemQrcode;
  } else if(data.imagem){
   document.getElementById('qrcodeImg').src = data.imagem;
  } else {
   // fallback: gera QR do copia e cola
   document.getElementById('qrcodeImg').src='https://api.qrserver.com/v1/create-qr-code/?size=260x260&data='+encodeURIComponent(data.pixCopiaECola || data.qrcode);
  }
  document.getElementById('pixCopiaECola').innerText = data.pixCopiaECola || data.qrcode || 'Erro';
 }catch(e){
  console.error(e);
  document.getElementById('pixCopiaECola').innerText='Erro ao gerar PIX: '+e.message+'\nTente novamente ou chame staff.';
  document.getElementById('qrcodeImg').src='https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=ERRO';
 }
}
</script>
</body>
</html>
