<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLS WIFI - EVENTOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{background:#0f0a1e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:white}
.card{background:linear-gradient(180deg,#2a1a5e 0%,#1a1033 100%);width:100%;max-width:390px;border-radius:24px;padding:28px;border:1px solid #3b2a7a;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.logo{text-align:center;margin-bottom:20px}
.logo h1{font-size:32px;font-weight:900;letter-spacing:2px}
.logo h1 span{color:#a78bfa}
.logo p{color:#8b7bb8;font-size:12px;margin-top:4px;letter-spacing:3px}
.plano{border:1px solid #3a2a6e;border-radius:16px;padding:12px;margin:8px 0;cursor:pointer}
.plano.ativo{background:#2a1e4e;border-color:#7c3aed}
.plano .preco{font-size:20px;font-weight:800}
.btn{width:100%;padding:16px;background:linear-gradient(90deg,#facc15,#eab308);color:#000;border:0;border-radius:12px;font-weight:900;font-size:16px;cursor:pointer;margin-top:12px}
.btn:disabled{opacity:.6}
#pix-area{display:none;margin-top:20px;text-align:center}
#qr-wrap{background:white;padding:12px;border-radius:16px;display:inline-block}
#qr-img{width:260px;height:260px;display:block}
#pix-copia-cola{background:#0f0a1e;border:1px dashed #3a2a6e;padding:12px;border-radius:10px;margin-top:12px;font-size:11px;word-break:break-all;color:#c4b5fd;text-align:left}
.voucher-area{margin-top:18px;border-top:1px solid #2a1e4e;padding-top:18px}
.voucher-area input{width:100%;padding:14px;border-radius:10px;border:1px solid #3a2a6e;background:#1a1342;color:white;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;text-align:center}
.btn-voucher{width:100%;padding:14px;border-radius:10px;border:0;background:#1e1b4b;color:#a78bfa;font-weight:800;margin-top:10px;border:1px solid #3a2a6e;cursor:pointer}
.footer{text-align:center;margin-top:18px;font-size:10px;color:#5a4a7a}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>SLS <span>WIFI</span> 🚀</h1>
    <p>INTERNET RAPIDA AQUI</p>
  </div>

  <div class="plano ativo" onclick="sel(this, 2, 200)">
    <div style="display:flex;justify-content:space-between"><b>1 HORA</b><span class="preco">R$ 2,00</span></div>
  </div>
  <div class="plano" onclick="sel(this, 5, 300)">
    <div style="display:flex;justify-content:space-between"><b>2 HORAS</b><span class="preco">R$ 5,00</span></div>
  </div>
  <div class="plano" onclick="sel(this, 12, 720)">
    <div style="display:flex;justify-content:space-between"><b>EVENTO TODO</b><span class="preco">R$ 12,00</span></div>
  </div>

  <button id="btn-gerar" class="btn">GERAR PIX - PAGAR AGORA</button>

  <div id="pix-area">
    <div id="qr-wrap"><img id="qr-img" alt="QR Code"></div>
    <div id="pix-copia-cola"></div>
    <button class="btn-voucher" onclick="copiarPix()">📋 COPIAR CÓDIGO PIX</button>
    <p id="status-pix" style="margin-top:10px;color:#facc15;font-weight:700">⏳ Aguardando pagamento... atualiza automático</p>
  </div>

  <div class="voucher-area">
    <p style="text-align:center;color:#8b7bb8;font-size:12px;margin-bottom:8px">Tenho voucher / Sou da equipe</p>
    <input id="inp-voucher" placeholder="DIGITE SLS...">
    <button class="btn-voucher" onclick="usarVoucher()">🎫 USAR VOUCHER</button>
  </div>

  <div class="footer">SLS WIFI v6.9 FIXO • MikroTik sls-liberado • 3HORAS</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const mac = urlParams.get('mac') || urlParams.get('mac-esc') || '';
const ip = urlParams.get('ip') || '10.5.50.1';
let valorCent = 200;
let txidGlobal=null, interval=null;

function sel(el, reais, cent){
  document.querySelectorAll('.plano').forEach(p=>p.classList.remove('ativo'));
  el.classList.add('ativo');
  valorCent=cent;
}

async function gerarPix(){
  const btn=document.getElementById('btn-gerar');
  btn.innerText='GERANDO PIX...'; btn.disabled=true;
  try{
    const res=await fetch('/api/criar-pix',{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mac,ip,valor:valorCent})});
    const data=await res.json();
    if(data.erro) throw new Error(data.erro);
    let b64=data.imagemQrcode.trim();
    document.getElementById('qr-img').src = b64.startsWith('data:')?b64:'data:image/png;base64,'+b64;
    document.getElementById('pix-copia-cola').innerText=data.qrcode;
    document.getElementById('pix-area').style.display='block';
    txidGlobal=data.txid;
    if(interval) clearInterval(interval);
    interval=setInterval(()=>checar(txidGlobal), 4000);
  }catch(e){ alert('Erro PIX: '+e.message); btn.disabled=false; btn.innerText='GERAR PIX - PAGAR AGORA'; return; }
  btn.innerText='PIX GERADO ABAIXO ↓';
}

function copiarPix(){
  const c=document.getElementById('pix-copia-cola').innerText;
  navigator.clipboard.writeText(c).then(()=>alert('PIX copiado!'));
}

async function checar(txid){
  try{
    const res=await fetch(`/api/pix?txid=${txid}`);
    const d=await res.json();
    if(d.status==='CONCLUIDA'||d.pago){
      clearInterval(interval);
      document.getElementById('status-pix').innerHTML='✅ PAGAMENTO APROVADO! Liberando...';
      // libera com usuario fixo
      window.location.href=`/api/libera?voucher=PIX-${txid.substring(0,6)}&mac=${mac}&ip=${ip}`;
    }
  }catch{}
}

async function usarVoucher(){
  const v=document.getElementById('inp-voucher').value.trim();
  if(!v) return alert('Digite o voucher');
  // envia pro servidor que marca como usado e faz login no mikrotik
  window.location.href=`/api/libera?voucher=${encodeURIComponent(v)}&mac=${encodeURIComponent(mac)}&ip=${encodeURIComponent(ip)}`;
}

document.getElementById('btn-gerar').addEventListener('click', gerarPix);
</script>
</body>
</html>
