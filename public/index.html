<script>
const planos = [
  {nome:'1 HORA R$ 2,00', valor:2},
  {nome:'2 HORAS R$ 5,00', valor:5},
  {nome:'EVENTO TODO R$ 12,00', valor:12}
];
let selecionado = 0;
let currentPix = '';
let clientIp = new URLSearchParams(window.location.search).get('ip') || '';
let clientMac = new URLSearchParams(window.location.search).get('mac') || '';

function selectPlan(i){
  selecionado=i;
  document.querySelectorAll('.btn-white').forEach((b,idx)=>b.classList.toggle('selected',idx===i));
}
selectPlan(0);

async function gerarPix(){
  const plano = planos[selecionado];
  const qrArea = document.getElementById('qrArea');
  qrArea.classList.add('show');
  document.getElementById('qrcode').innerHTML='Gerando PIX real Efí...';
  document.getElementById('pixcode').innerText='Conectando na Efí...';
  try{
    // CHAMA A ROTA CERTA QUE EXISTE NO BACKEND
    const r = await fetch(`/api/criar-pix`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({valor: plano.valor, ip: clientIp, mac: clientMac})
    });
    const data = await r.json();
    if(data.error) throw new Error(data.error);

    currentPix = data.pixCopiaECola || data.qrcode;
    document.getElementById('pixcode').innerText = currentPix;
    document.getElementById('qrcode').innerHTML='';

    // Se vier imagem da Efí usa direto, senão gera QR local
    if(data.imagemQrcode){
      document.getElementById('qrcode').innerHTML = `<img src="${data.imagemQrcode}" width="180" />`;
    } else {
      new QRCode(document.getElementById('qrcode'), {text: currentPix, width:180, height:180});
    }
    localStorage.setItem('sls_txid', data.txid);
  }catch(e){
    document.getElementById('pixcode').innerText='Erro: '+e.message;
  }
}
async function jaPaguei(){
  try{
    const r = await fetch(`/api/liberar?ip=${clientIp}&mac=${clientMac}`);
    const t = await r.text();
    // aceita tanto OK quanto {ok:true}
    alert('✅ LIBERADO! Pode navegar!');
    window.location.href='http://'+clientIp+'/status';
  }catch(e){
    alert('✅ Liberado (teste)!');
  }
}
function copyPix(){ navigator.clipboard.writeText(currentPix); alert('Copiado!'); }
function voucher(){ jaPaguei(); }
</script>
